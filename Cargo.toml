[package]
name = "drata-cli"
version = "0.1.0"
edition = "2024"
authors = ["Scott Idler <scott.idler@tatari.tv>"]
build = "build.rs"
description = "A CLI application generated by rust-scaffold"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
colored = "3.1.1"
dirs = "6.0.0"
env_logger = "0.11.11"
eyre = "0.6.12"
log = "0.4.33"
serde = { version = "1.0.228", features = ["derive"] }
serde_yaml = "0.9.34"
# Dependencies will be added via cargo add

[dev-dependencies]
# tempfile is used by the generated config/tests.rs and lib tests
tempfile = "3"

[build-dependencies]
# For build.rs if needed
