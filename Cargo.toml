[package]
name = "drata-cli"
version = "0.1.0"
edition = "2024"
authors = ["Scott Idler <scott.idler@tatari.tv>"]
build = "build.rs"
description = "A CLI application generated by rust-scaffold"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
dirs = "6.0.0"
eyre = "0.6.12"
percent-encoding = "2.3.2"
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls", "http2", "charset"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
terminal_size = "0.4.4"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
# Dependencies will be added via cargo add

[dev-dependencies]
# tempfile is used by the generated config/tests.rs and lib tests
tempfile = "3"
wiremock = "0.6.5"

[build-dependencies]
# For build.rs if needed
