name: release

# Tag-driven release for drata-cli. On a v* tag, the org reusable cross-compiles the
# drata-cli binary for the four standard targets (linux amd64/arm64, macOS
# x86_64/arm64), tarballs + sha256 each, and publishes the GitHub Release.
#
# Same pattern as clyde and marquee. The reusable owns the build matrix, tarballing,
# checksums, and Release creation; this caller just selects the binary to ship.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cli-release:
    name: CLI Release
    uses: tatari-tv/github-actions/.github/workflows/rust-cli-release.yml@v5
    with:
      bin-names: drata-cli
