# drata-cli.yml - sample configuration file
#
# Credentials are NOT stored here. They live in a JSON file with named profiles:
#   ~/.config/drata/credentials.json   (mode 0600)
#
# Example credentials.json:
#   {
#     "profiles": {
#       "default": { "api-key": "<your-key>", "region": "us", "allow-writes": false },
#       "prod":    { "api-key": "<your-key>", "region": "us", "allow-writes": true  }
#     }
#   }
#
# Create or update a profile with:
#   drata login --api-key <your-key> --region us [--allow-writes]
#
# Precedence: CLI flags > env vars (DRATA_API_KEY / DRATA_REGION / DRATA_PROFILE)
# > credentials file. Writes fail closed: a non-GET request requires a
# write-enabled credential (allow-writes: true) or the --allow-writes flag.
